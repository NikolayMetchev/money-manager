  # Static unused-symbol/parameter analysis is unreliable for test code: helpers, fixtures and
  # repository factories are referenced only by `@Test` methods, which the PR-diff analysis doesn't
  # treat as roots (verified false positives, e.g. helpers used 11-15x). Don't fail PRs on it in tests.
  - name: UnusedSymbol
    paths:
      - app/ui/core/src/commonTest
      - app/db/core/src/commonTest
  - name: unused
    paths:
      - app/ui/core/src/commonTest
      - app/db/core/src/commonTest
  # ── app/ui/core split into per-feature app/ui/<feature> modules (PR #585) ──────────
  # Relocating the UI out of app/ui/core makes Qodana's PR-mode re-analyse every moved
  # file as "new code", resurfacing the same inspection families already suppressed for
  # app/ui/core above — now spread across the new modules. Scope them to app/ui:
  #   * HasPlatformType — Mokkery stubs / Android interop infer platform types in UI
  #     code and (mostly) tests; unchecked-nullability noise, not real defects.
  #   * JUnitMalformedDeclaration — expression-body `@Test fun … = runComposeUiTest {}`
  #     infers a non-Unit return; a Compose-UI-test idiom, not a malformed test.
  #   * unused / UnusedSymbol(Local) / UnusedDeclaration — sealed `Screen` destinations
  #     and platform expect/actual + DI-referenced files are used cross-module, which
  #     Qodana's per-module KMP import doesn't resolve (mirrors the app/ui/core entries).
  #   * KotlinUnusedImport / KotlinConstantConditions — pre-existing test false positives
  #     (e.g. `by` delegations, Mokkery `calls {}` lambdas) carried over with the tests.
  #   * SameParameterValue / DuplicatedCode — small repeated Compose field/label fragments.
  - name: HasPlatformType
    paths:
      - app/ui
  - name: JUnitMalformedDeclaration
    paths:
      - app/ui
  - name: KotlinUnusedImport
    paths:
      - app/ui
  - name: KotlinConstantConditions
    paths:
      - app/ui
  - name: SameParameterValue
    paths:
      - app/ui
  - name: DuplicatedCode
    paths:
      - app/ui
  - name: unused
    paths:
      - app/ui
  - name: UnusedSymbol
    paths:
      - app/ui
  - name: UnusedDeclaration
    paths:
      - app/ui
  - name: UnusedSymbolLocal
    paths:
      - app/ui
  # ── Import directories feature (issue #602) ──────────────────────────────────────
  # New DB-free ImportFileSource abstraction + per-platform DI factories + scanner.
  #   * UnusedReceiverParameter — ImportFileEntry/QifParseResult extension helpers DO use
  #     their receiver (lastModifiedEpochMs / records / sections); flagged only because
  #     Qodana's per-module KMP import leaves those members unresolved.
  #   * unused — ImportFileSource.download(fileRef)'s param is used by the local + Drive
  #     backends, which live in separate modules Qodana doesn't resolve here; the Android
  #     DI factory actuals must match the expect signature but stub out (Drive-on-Android
  #     not wired yet).
  #   * UnusedSymbol(Local)/UnusedDeclaration — createImportFileSourceFactory /
  #     createDriveFolderBrowser expect/actuals are called from the Android app + DI,
  #     which Qodana's KMP import doesn't resolve (mirrors the RemoteStorage entries).
  - name: UnusedReceiverParameter
