  - name: RedundantSuppression
    paths:
      - app/ui/core/build/generated
  - name: EditorConfigKeyCorrectness
    paths:
      # .editorconfig was moved up from app/ui/core to app/ui (shared Compose ktlint rules).
      - app/ui/.editorconfig
  - name: unused
    paths:
      # Metro DI modules/providers and the DB-free catalog factory are consumed by the Metro
      # compiler plugin / DI wiring, which qodana can't see.
