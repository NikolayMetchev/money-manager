####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

# Every exclusion below works around a verified linter defect (each entry says which); anything the
# linter reported correctly has been fixed in code instead. The two style inspections this project
# rejects on purpose (DestructuringDeclaration, KotlinPrintToLogpoint) are disabled in
# .qodana/profile.xml, not excluded here.
#
# The recurring defects, referenced by number below:
#   [1] QD-14665 — Metro DI annotations (@Provides/@ContributesTo/@DependencyGraph) are marked as
#       entry points in .idea/misc.xml, but the linter still reports some identically-annotated
#       providers/graph members as unused (e.g. every provide*WriteRepository in RepositoryModule).
#   [2] Per-module KMP import — the linter resolves each Gradle module in isolation, so symbols
#       consumed from another module (expect/actual counterparts, platform impls wired from
#       app/main, test fixtures in test/*, parameters whose non-constant callers live elsewhere)
#       are reported unused/constant.
#   [3] EAP KotlinUnreachableCode — everything after `?: throw`/`?: error(...)` inside a lambda or
#       `use {}` block is flagged unreachable, once per column; the flagged code demonstrably runs
#       (the files execute in production/CI).
#   [4] Interface-mandated members — override parameters of test fakes and intentional constant
#       returns/no-op bodies of capability methods are design, not defects; the linter has no way
#       to know (and for override params even contradicts its own Java-side exemption).

version: "1.0"
linter: jetbrains/qodana-jvm-community:2026.2-eap
plugins:
  - id: com.squareup.sqldelight
profile:
  path: .qodana/profile.xml
exclude:
  # Compose @Composable functions are PascalCase by convention; the community linter has no
  # Compose awareness. ktlint (compose ruleset) polices naming in these modules instead.
  - name: FunctionName
    paths:
      - app/ui
      - app/main/android/src

  # [3] — `?: error(...)` inside runMoneyManagerComposeUiTest/use{} lambdas.
  - name: KotlinUnreachableCode
    paths:
      - app/ui/core/src/commonTest/kotlin/com/moneymanager/ui/screens/CsvAccountSourceAuditE2ETest.kt
      - app/ui/core/src/commonTest/kotlin/com/moneymanager/ui/screens/MonzoImportAuditE2ETest.kt
      - app/ui/core/src/commonTest/kotlin/com/moneymanager/ui/screens/CsvReimportE2ETest.kt
      - app/importfilesource/localfolder/src/androidMain/kotlin/com/moneymanager/importfilesource/localfolder/SafFolderImportFileSource.kt
      - app/apiimporter/src/commonMain/kotlin/com/moneymanager/apiimporter/ApiSessionImportService.kt

  # Compile-verified: these opt-ins are still required (ExperimentalMaterial3Api on
  # ExposedDropdownMenuBox/menuAnchor, ExperimentalTestApi on runComposeUiTest) — removing them
  # breaks the build. EAP false positive.
  - name: UnnecessaryOptInAnnotation
    paths:
      - app/ui

  # [2] — the project compiles (so every expect has its actuals); the linter's KMP model doesn't
  # see the platform source sets that hold them.
  - name: KotlinNoActualForExpect

  # "URI is not registered" on androidDeviceTest AndroidManifest.xml files — the community linter
  # ships no Android plugin, so the manifest schema is unknown to it.
  - name: XmlHighlighting

  # ktlint_* keys are ktlint extension properties (honoured by ktlint, which is what consumes this
  # file); the IDE editorconfig inspection only knows IDE/editorconfig-core keys.
  - name: EditorConfigKeyCorrectness
    paths:
      - app/ui/.editorconfig

  # `import kotlinx.serialization.modules.subclassesOfSealed` is used on the next screenful; the
  # linter fails to resolve this experimental serialization API and calls the import unused.
  - name: KotlinUnusedImport
    paths:
      - app/ui/foundation/src/commonMain/kotlin/com/moneymanager/ui/navigation/ScreenSerialization.kt

  # Mokkery `calls { (code) -> ... it.code == code }` — the lambda parameter comes from the mock
  # invocation at runtime; the condition is not constant.
  - name: KotlinConstantConditions
    paths:
      - app/ui/transactions/src/commonTest/kotlin/com/moneymanager/ui/screens/transactions/AccountTransactionsScreenTest.kt

  # `assertEquals(emptyList(), decodeRowRules(...))` already has the expected value first.
  - name: KotlinMisorderedAssertEqualsArguments
    paths:
      - app/db/read/src/commonTest/kotlin/com/moneymanager/database/json/FieldMappingJsonCodecTest.kt

  # [2] — each receiver IS used (lastModifiedEpochMs / records / sections / isNull+getLong); the
  # receiver's type lives in another module, so its members resolve to nothing here.
  - name: UnusedReceiverParameter
    paths:
      - app/csvimporter/src/commonMain/kotlin/com/moneymanager/csvimporter/ImportDirectoryScanner.kt
      - app/csvimporter/src/commonMain/kotlin/com/moneymanager/csvimporter/QifStagingConversion.kt
      - app/importfilesource/localfolder/src/androidMain/kotlin/com/moneymanager/importfilesource/localfolder/SafFolderImportFileSource.kt

  # [2] — refreshViews/sourceAccountOverride/engineBatchSize are passed other values by callers in
  # the UI modules (and one Poi-typed test builder the linter can't resolve).
  - name: SameParameterValue
    paths:
      - app/csvimporter/src/commonMain/kotlin/com/moneymanager/csvimporter/CsvImportApplier.kt
      - app/csvimporter/src/commonMain/kotlin/com/moneymanager/csvimporter/CsvReimport.kt
      - app/qifimporter/src/commonMain/kotlin/com/moneymanager/qifimporter/QifReimport.kt

  # [4] — platform capability methods and an interface default that intentionally return a
  # constant (both platforms support every provider; non-token backends return null), plus test
  # fakes stubbing constants.
  - name: SameReturnValue
    paths:
      - app/importfilesource/di/src/androidMain/kotlin/com/moneymanager/importfilesource/di/CreateImportFileSourceFactory.android.kt
      - app/importfilesource/di/src/jvmMain/kotlin/com/moneymanager/importfilesource/di/CreateImportFileSourceFactory.jvm.kt
      - app/model/core/src/androidMain/kotlin/com/moneymanager/domain/model/DbLocation.kt
      - app/remotestorage/core/src/commonMain/kotlin/com/moneymanager/remotestorage/RemoteStorageProvider.kt
      - app/ui/imports/timeline/src/commonTest/kotlin/com/moneymanager/ui/screens/timeline/ImportTimelineScreenTest.kt
      - test/app/db/src/androidMain/kotlin/com/moneymanager/test/database/TestDatabaseHelper.kt

  # [4] — deliberate no-op bodies: the Android onCreate-for-existing-DB branch and the Android
  # scrollbar actuals (Android has no desktop-style scrollbars).
  - name: EmptyMethod
    paths:
      - app/db/core/src/androidMain/kotlin/com/moneymanager/database/AndroidDatabaseManager.kt
      - utils/compose/scrollbar/src/androidMain/kotlin/com/moneymanager/compose/scrollbar/PlatformScrollbar.kt

  # Reviewed duplicates with no extractable abstraction: Mappie-template-shaped mapper pairs,
  # near-identical import/reimport orchestration blocks, and small repeated Compose fragments.
  - name: DuplicatedCode
    paths:
      - app/csvimporter/src/commonMain/kotlin/com/moneymanager/csvimporter/CsvImportApplier.kt
      - app/csvimporter/src/commonMain/kotlin/com/moneymanager/csvimporter/CsvReimport.kt
      - app/csvimporter/src/commonMain/kotlin/com/moneymanager/csvimporter/QifStagingConversion.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/OwnershipAuditHistoryForAccountMapper.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/TransferAuditEntryMapper.kt
      - app/importer/src/commonMain/kotlin/com/moneymanager/importer/ImportDeduper.kt
      - app/ui/imports/csv/src/commonMain/kotlin/com/moneymanager/ui/components/csv/CsvPreviewTable.kt
      - app/ui/imports/csv/src/commonMain/kotlin/com/moneymanager/ui/screens/csv/ReimportDialog.kt
      - app/ui/imports/csv/src/commonMain/kotlin/com/moneymanager/ui/screens/csvstrategy/editor/ConversionEditors.kt
      - app/ui/imports/importDirectory/src/commonMain/kotlin/com/moneymanager/ui/screens/importdirectory/ImportDirectoryAuditScreen.kt

  # "Initializer is redundant" fires on `val x = remember { ... }` / `LocalX.current` — a val
  # with its only initializer cannot have a redundant one. EAP false positive AND
  # nondeterministic: three consecutive identical scans flagged zero, then two, then two
  # different files (the linter's own sanity check reports the Kotlin inspections as suspect),
  # so it must be excluded wholesale — path entries just chase it around the codebase.
  - name: VariableInitializerIsRedundant

  # CryptographyProvider.get is not an operator fun, so the suggested indexing syntax doesn't
  # compile.
  - name: ReplaceGetOrSet
    paths:
      - utils/archive/src/commonMain/kotlin/com/moneymanager/archive/ArchiveCodec.kt
      - utils/rest/src/commonMain/kotlin/com/moneymanager/rest/ApiRequestSigner.kt

  # [1]+[2]+[4] — the unused-symbol family. Every entry verified: Metro providers/graph members
  # ([1]); expect/actual factories, platform impls and test fixtures consumed from other modules
  # ([2] — e.g. isDocumentTreeRef is called from app/importfilesource/di, getAuditableTables from
  # app/db/core tests, DbTest/TestProvenance from many modules' tests); interface-mandated override
  # parameters of fakes and no-op actuals ([4]); FieldMapping's `override val id` and DbLocation's
  # expect-fun parameter, both reported as "unused parameter".
  - name: unused
    paths:
      # revisionId in toDomain is unused by design (positional match for the generated mapper —
      # see the comment there); the in-code @Suppress can't carry the IDE's "unused" id because
      # RedundantSuppression then flags the detekt-only ids sharing the annotation.
      - app/db/repository/src/commonMain/kotlin/com/moneymanager/database/repository/CsvImportStrategyReadRepositoryImpl.kt
      - app/db/core/src/androidMain/kotlin/com/moneymanager/database/AndroidDatabaseManager.kt
      - app/db/di/src/androidMain/kotlin/com/moneymanager/database/di/CreateDatabaseManager.android.kt
      - app/db/di/src/commonMain/kotlin/com/moneymanager/database/di/DatabaseComponent.kt
      - app/db/di/src/commonMain/kotlin/com/moneymanager/database/di/DeviceIdModule.kt
      - app/db/di/src/commonMain/kotlin/com/moneymanager/database/di/RepositoryModule.kt
      - app/db/di/src/jvmMain/kotlin/com/moneymanager/database/di/CreateDatabaseManager.jvm.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/IdConversions.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/InstantConversions.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/SourceTypeConversions.kt
      - app/db/write/src/commonMain/kotlin/com/moneymanager/database/write/MoneyManagerDatabaseWrapper.kt
      - app/di/core/src/androidMain/kotlin/com/moneymanager/di/VersionReader.android.kt
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/AppComponent.kt
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/AppVersionModule.kt
      - app/importfilesource/core/src/commonMain/kotlin/com/moneymanager/importfilesource/ImportFileSource.kt
      - app/importfilesource/di/src/androidMain
      - app/importfilesource/di/src/jvmMain
      - app/importfilesource/localfolder/src/androidMain/kotlin/com/moneymanager/importfilesource/localfolder/SafFolderImportFileSource.kt
      - app/model/core/src/commonMain/kotlin/com/moneymanager/domain/model/DbLocation.kt
      - app/model/csvstrategy/src/commonMain/kotlin/com/moneymanager/domain/model/csvstrategy/FieldMapping.kt
      - app/remotestorage/di/src/androidMain
      - app/remotestorage/di/src/jvmMain
      - app/remotestorage/googledrive/src/jvmAndroidMain/kotlin/com/moneymanager/remotestorage/googledrive/GoogleDriveProviderFactory.kt
      - app/strategycatalog/src/androidMain/kotlin/com/moneymanager/strategycatalog/StrategyCatalogFactory.android.kt
      - app/strategycatalog/src/commonTest/kotlin/com/moneymanager/strategycatalog/StrategyCatalogControllerTest.kt
      - app/ui/foundation/src/androidMain
      - app/ui/foundation/src/jvmMain
      - app/ui/imports/timeline/src/commonTest/kotlin/com/moneymanager/ui/screens/timeline/ImportTimelineScreenTest.kt
      - test/app/db/src
      - utils/compose/scrollbar/src/androidMain/kotlin/com/moneymanager/compose/scrollbar/PlatformScrollbar.kt
      - utils/compose/scrollbar/src/jvmMain/kotlin/com/moneymanager/compose/scrollbar/PlatformScrollbar.kt
      - utils/localsettings/di/src/androidMain
      - utils/localsettings/di/src/jvmMain
      - utils/localsettings/src/androidMain/kotlin/com/moneymanager/localsettings/AndroidLocalSettings.kt
      - utils/parsers/xlsx/src/jvmTest/kotlin/com/moneymanager/xlsx/XlsxParserTest.kt
  - name: UnusedSymbol
    paths:
      - app/db/core/src/androidMain/kotlin/com/moneymanager/database/AndroidDatabaseManager.kt
      - app/db/di/src/androidMain/kotlin/com/moneymanager/database/di/CreateDatabaseManager.android.kt
      - app/db/di/src/commonMain/kotlin/com/moneymanager/database/di/DatabaseComponent.kt
      - app/db/di/src/commonMain/kotlin/com/moneymanager/database/di/DeviceIdModule.kt
      - app/db/di/src/commonMain/kotlin/com/moneymanager/database/di/RepositoryModule.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/IdConversions.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/InstantConversions.kt
      - app/db/read/src/commonMain/kotlin/com/moneymanager/database/mapper/SourceTypeConversions.kt
      - app/db/write/src/commonMain/kotlin/com/moneymanager/database/write/MoneyManagerDatabaseWrapper.kt
      - app/di/core/src/androidMain/kotlin/com/moneymanager/di/VersionReader.android.kt
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/AppComponent.kt
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/AppVersionModule.kt
      - app/importfilesource/di/src/androidMain
      - app/importfilesource/localfolder/src/androidMain/kotlin/com/moneymanager/importfilesource/localfolder/SafFolderImportFileSource.kt
      - app/remotestorage/di/src/androidMain
      - app/remotestorage/googledrive/src/jvmAndroidMain/kotlin/com/moneymanager/remotestorage/googledrive/GoogleDriveProviderFactory.kt
      - app/strategycatalog/src/androidMain/kotlin/com/moneymanager/strategycatalog/StrategyCatalogFactory.android.kt
      - app/ui/foundation/src/androidMain
      - app/ui/foundation/src/jvmMain
      - test/app/db/src
      - utils/compose/scrollbar/src/androidMain/kotlin/com/moneymanager/compose/scrollbar/PlatformScrollbar.kt
      - utils/compose/scrollbar/src/jvmMain/kotlin/com/moneymanager/compose/scrollbar/PlatformScrollbar.kt
      - utils/localsettings/di/src/androidMain
      - utils/localsettings/src/androidMain/kotlin/com/moneymanager/localsettings/AndroidLocalSettings.kt

  # Generated sources (SQLDelight/Mappie/Compose codegen) live under build/ — not hand-written
  # code, so findings there are not actionable. Only literal paths are honoured by the linter
  # (wildcard globs silently don't match), so every module whose codegen produces findings
  # needs a literal entry.
  - name: All
    paths:
      - build
      - app/db/read/build
      - app/db/write/build
      - app/db/schema/build
      - app/db/seed/build
      - app/db/repository/build
      - app/db/di/build
      - app/model/repository/read/build
      - app/model/repository/write/build
      - gradle/build-logic/build
      - app/db/core/build
      - app/ui/core/build

include:
  - name: CheckDependencyLicenses
failureConditions:
  severityThresholds:
    any: 0
    critical: 0
