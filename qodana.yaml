version: "1.0"
linter: jetbrains/qodana-jvm-community:2026.2-eap
plugins:
  - id: com.squareup.sqldelight
profile:
  path: .qodana/profile.xml
exclude:
  - name: KotlinNoActualForExpect
  - name: XmlHighlighting
  - name: FunctionName
    paths:
      # app/ui/core was split into per-feature app/ui/<feature> modules; the Compose
      # @Composable PascalCase functions are now spread across all of them.
      - app/ui
      - app/main/android/src
