####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-jvm-community:2026.1
bootstrap: rm -f gradle/gradle-daemon-jvm.properties && printf "qodana=true\nandroid.builder.sdkDownload=false\n" >> gradle.properties && echo "sdk.dir=/tmp/android-sdk" >> local.properties && mkdir -p /tmp/android-sdk && ./gradlew koverXmlReport --continue --no-daemon --console=plain ; mkdir -p .qodana/code-coverage && cp build/reports/kover/report.xml .qodana/code-coverage/
plugins:
  - id: com.squareup.sqldelight
profile:
  path: .qodana/profile.xml
include:
  - name: CheckDependencyLicenses
failureConditions:
  severityThresholds:
    critical: 0