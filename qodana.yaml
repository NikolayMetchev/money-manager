####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-jvm-community:2026.1
bootstrap: mkdir -p .gradle && echo "java.home=$JAVA_HOME" > .gradle/config.properties && printf "qodana=true\norg.gradle.java.installations.auto-download=false\norg.gradle.java.installations.fromEnv=JAVA_HOME\n" >> gradle.properties
plugins:
  - id: com.squareup.sqldelight
profile:
  path: .qodana/profile.xml
include:
  - name: CheckDependencyLicenses
failureConditions:
  severityThresholds:
    critical: 0