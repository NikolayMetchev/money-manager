####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
linter: jetbrains/qodana-jvm-community:2026.1
plugins:
  - id: com.squareup.sqldelight
profile:
  path: .qodana/profile.xml
exclude:
  - name: KotlinNoActualForExpect
  - name: XmlHighlighting
  - name: FunctionName
    paths:
      - app/ui/core/src
      - app/main/android/src
  - name: KotlinUnreachableCode
    paths:
      - app/ui/core/src/commonTest/kotlin/com/moneymanager/ui/screens/MonzoImportAuditE2ETest.kt
  - name: UnnecessaryModuleDependencyInspection
  - name: RedundantSuppression
    paths:
      - app/ui/core/build/generated
  - name: EditorConfigKeyCorrectness
    paths:
      - app/ui/core/.editorconfig
  - name: unused
    paths:
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/*Module.kt
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/database/*Module.kt
  - name: UnusedDeclaration
    paths:
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/*Module.kt
      - app/di/core/src/commonMain/kotlin/com/moneymanager/di/database/*Module.kt
  - name: All
    paths:
      - build
      - "*/build"
      - "*/*/build"
      - "*/*/*/build"
      - gradle/build-logic/build
      - app/db/core/build
      - app/ui/core/build
include:
  - name: CheckDependencyLicenses
failureConditions:
  severityThresholds:
    critical: 0
