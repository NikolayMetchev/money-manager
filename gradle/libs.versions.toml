[bundles]
# Tooling transitive deps pinned to one version across all build classpaths via dependency
# substitution. NOTE: compose-internal annotation/collection are deliberately NOT pinned — forcing
# them desyncs the Compose runtime and breaks Compose UI tests. Kotlin compiler/stdlib/reflect and
# dagger are also excluded (each plugin needs its own compatible version).
build-tool-pins = [
    "buildtool-animal-sniffer",
    "buildtool-asm",
    "buildtool-asm-analysis",
    "buildtool-asm-commons",
    "buildtool-asm-tree",
    "buildtool-asm-util",
    "buildtool-checker-qual",
    "buildtool-commons-io",
    "buildtool-errorprone",
    "buildtool-grpc-api",
    "buildtool-grpc-context",
    "buildtool-grpc-core",
    "buildtool-grpc-netty",
    "buildtool-grpc-protobuf",
    "buildtool-grpc-protobuf-lite",
    "buildtool-grpc-stub",
    "buildtool-gson",
    "buildtool-guava",
    "buildtool-guava-failureaccess",
    "buildtool-httpclient",
    "buildtool-j2objc",
    "buildtool-javawriter",
    "buildtool-jsr305",
    "buildtool-kotlinpoet",
    "buildtool-kotlinpoet-jvm",
    "buildtool-logback-classic",
    "buildtool-logback-core",
    "buildtool-netty-buffer",
    "buildtool-netty-codec",
    "buildtool-netty-codec-http",
    "buildtool-netty-codec-http2",
    "buildtool-netty-codec-socks",
    "buildtool-netty-common",
    "buildtool-netty-handler",
    "buildtool-netty-handler-proxy",
    "buildtool-netty-resolver",
    "buildtool-netty-transport",
    "buildtool-netty-transport-native-unix-common",
    "buildtool-perfmark",
    "buildtool-poko-annotations",
    "buildtool-poko-annotations-jvm",
    "buildtool-proto-google-common-protos",
    "buildtool-protobuf-java",
    "buildtool-protobuf-java-util",
    "buildtool-tink",
]

