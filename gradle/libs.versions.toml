androidx-concurrent-futures = "1.2.0"
androidx-lifecycle = "2.9.4"
androidx-navigationevent = "1.0.1"
androidx-savedstate = "1.4.0"
androidx-test-services-storage = "1.6.0"
androidx-tracing = "1.2.0"
atomicfu = "0.28.0"
jetbrains-annotations = "23.0.0"
androidx-compose = "1.11.2"
androidx-compose-material-icons = "1.7.8"
androidx-compose-material3 = "1.4.0"
androidx-sqlite = "2.6.2"
androidx-test-core = "1.7.0"
androidx-test-monitor = "1.8.0"
androidx-test-runner = "1.7.0"
compose = "1.7.5"
