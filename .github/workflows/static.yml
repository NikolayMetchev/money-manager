# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install Graphviz
        # SchemaSpy needs the `dot` binary to render schema relationship diagrams
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Generate database schema docs
        uses: ./.github/actions/gradle-run
        with:
          command: ':app:db:schemaspy:publishSchemaSpyDocs --stacktrace'
          cache-read-only: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Publish only the documentation, not the whole repository
          path: 'docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
