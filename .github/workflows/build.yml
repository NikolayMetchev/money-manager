# Unified CI: build/test, Android instrumented tests, Qodana, and auto-format.
# A single `changes` job decides once whether the push/PR touches anything
# other than docs/webpage/markdown; every heavy job below `needs` it and is
# skipped otherwise. A skipped *required* job is treated as a pass by branch
# protection, so the required checks still report green (skipping at the
# workflow level via `on.paths` would instead leave them pending forever and
# block the merge).
name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      # Default to 'true' (run everything) when the filter doesn't run, e.g. on
      # workflow_dispatch where there is no diff base. A non-empty 'false' from
      # the filter is truthy and wins over the fallback.
      code: ${{ steps.filter.outputs.code || 'true' }}
    steps:
      # Needed so paths-filter can diff against the previous commit on push
      # events (on pull_request it uses the API and the checkout is unused).
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false  # read-only job, no git push
      - name: Filter changed paths
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          # 'every' => a file matches `code` only if it is outside ALL of these
          # globs, so `code` is true when any real (non-docs) file changed.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!docs/**'
              - '!webpage/**'
              - '!**/*.md'
              - '!.github/workflows/static.yml'

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [changes, lint-format]
    # Runs on PRs and pushes to main (not on releases/* pushes). Heavy jobs wait for the cheap
    # lint-format job: when it pushes formatting fixes, the resulting `synchronize` event cancels
    # this run before the heavy jobs have burned minutes. `!cancelled()` is required so a SKIPPED
    # lint-format (push/dispatch events) doesn't auto-skip this job.
    if: >-
      !cancelled() &&
      needs.changes.outputs.code == 'true' &&
      (needs.lint-format.result == 'success' || needs.lint-format.result == 'skipped') &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build with Gradle
        uses: ./.github/actions/gradle-run
        # Default desktop Google OAuth client, injected into the JVM build by the
        # generateGoogleOAuthDefaults task. Scoped to this step only. Empty on forks/PRs without the
        # secrets — the build still compiles and Google Drive reports "not configured".
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        with:
          # `koverXmlReport` name-matches into every module and produces the per-module
          # unit-coverage XMLs. db:core's tests run here too: the dedicated `db-core-test` job was
          # removed once parallel test forks + minimal test currency seeding cut its ~12 min
          # jvmTest down to ~1-2 min.
          command: build koverXmlReport --stacktrace
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Upload coverage and test results to Codecov
        uses: ./.github/actions/codecov-upload
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit

  android-test:
    name: Android Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [changes, lint-format]
    if: >-
      !cancelled() &&
      needs.changes.outputs.code == 'true' &&
      (needs.lint-format.result == 'success' || needs.lint-format.result == 'skipped') &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Gradle environment
        uses: ./.github/actions/gradle-setup
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: AVD cache
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # Android emulator API level sync: update with the Gradle managed device,
          # .idea/runConfigurations/Android_Tests.xml, and AGENTS.md.
          key: avd-pixel6-api36-aosp-atd-${{ runner.os }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # Android emulator API level sync: update with the Gradle managed device,
          # .idea/runConfigurations/Android_Tests.xml, and AGENTS.md.
          # aosp_atd is the headless test-optimized image — same source as the local
          # Gradle managed device (systemImageSource = "aosp-atd").
          api-level: 36
          arch: x86_64
          profile: pixel_6
          target: aosp_atd
          # The API-36 ATD images are only published on the dev sdkmanager channel.
          channel: dev
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run Android instrumented tests
        timeout-minutes: 20
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # Android emulator API level sync: update with the Gradle managed device,
          # .idea/runConfigurations/Android_Tests.xml, and AGENTS.md.
          api-level: 36
          arch: x86_64
          profile: pixel_6
          target: aosp_atd
          # The API-36 ATD images are only published on the dev sdkmanager channel.
          channel: dev
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # JaCoCo coverage instrumentation slows every instrumented test, so PRs run the tests
          # uninstrumented; pushes to main collect and upload the instrumented coverage.
          script: ./gradlew connectedAndroidDeviceTest${{ github.ref == 'refs/heads/main' && ' createAndroidDeviceTestCoverageReport -PandroidCoverage=true' || '' }} --stacktrace --console=plain

      - name: Upload coverage and test results to Codecov
        if: always() && github.ref == 'refs/heads/main'
        uses: ./.github/actions/codecov-upload
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: instrumented
          coverage-file: '**/build/reports/coverage/**/*.xml'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-results
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
          retention-days: 7

  build-health:
    name: Dependency Health
    runs-on: ubuntu-latest
    needs: [changes, lint-format]
    # DAGP's buildHealth aggregation over every module used to run inside the main build job
    # (root `build` depended on it); as its own job it gates PRs off the critical path.
    if: >-
      !cancelled() &&
      needs.changes.outputs.code == 'true' &&
      (needs.lint-format.result == 'success' || needs.lint-format.result == 'skipped') &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false  # read-only job, no git push

      - name: Run buildHealth with Gradle
        uses: ./.github/actions/gradle-run
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        with:
          command: buildHealth --stacktrace
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

  android-release:
    name: Android Release Build
    runs-on: ubuntu-latest
    needs: [changes, lint-format]
    # The R8/minified release APK is no longer built on PRs (-PbuildRelease gates the variant),
    # so build it on every push to main: R8 breakage surfaces there, and release.yml's
    # check-build gate then blocks tagging a broken commit. Keep the command identical to
    # release.yml's Android matrix entry so they share a configuration-cache entry.
    if: >-
      !cancelled() &&
      needs.changes.outputs.code == 'true' &&
      (needs.lint-format.result == 'success' || needs.lint-format.result == 'skipped') &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false  # read-only job, no git push

      - name: Build release APK with Gradle
        uses: ./.github/actions/gradle-run
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        with:
          command: :app:main:android:assembleRelease -PbuildRelease=true --stacktrace
          cache-read-only: false
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

  qodana:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes, lint-format]
    # Unlike the other heavy jobs this one also runs on workflow_dispatch, so it has no
    # event-name condition.
    # Runs the 2026.2-eap linter (qodana.yaml): EAP linters need no Qodana Cloud license,
    # which works around the expired open-source license (and retests QD-14665). No QODANA_TOKEN
    # is passed: when one is present the linter validates it even on EAP and dies with "token was
    # declined by Qodana Cloud server" before producing a SARIF (verified: actions run
    # 30006530973). Re-add the token env once the license is renewed to restore cloud upload.
    # SARIF goes to GitHub Code Scanning and the run artifact either way.
    if: >-
      !cancelled() &&
      needs.changes.outputs.code == 'true' &&
      (needs.lint-format.result == 'success' || needs.lint-format.result == 'skipped')
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          # On PRs check out the actual PR commit, not the merge commit; on
          # push/workflow_dispatch fall back to the triggered ref.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0  # a full history is required for pull request analysis
          persist-credentials: false  # read-only job, no git push
      - name: Generate SQLDelight and Mappie sources
        uses: ./.github/actions/gradle-run
        with:
          command: jvmMainClasses
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
      - name: Restore Qodana cache (read-only on non-main branches)
        if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/releases/')
        uses: actions/cache/restore@v6
        with:
          path: ${{ runner.temp }}/qodana/caches
          key: qodana-2026.2-eap-refs/heads/main
          restore-keys: qodana-2026.2-eap-
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          upload-result: true
          # On PRs analyse only the changed files and fail solely on problems they introduce. The
          # whole-project + cloud-baseline approach didn't subtract main's pre-existing problems on PR
          # runs (they were all reported as "new"); push-to-main runs still do a full scan and refresh
          # the baseline.
          pr-mode: ${{ github.event_name == 'pull_request' }}
          use-caches: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/releases/') }}
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qodana-sarif
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          retention-days: 7
      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

  lint-format:
    name: Auto-format PR
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          # Use PAT to trigger workflows on the pushed commit
          # GITHUB_TOKEN doesn't trigger workflows to prevent infinite loops
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          # JVM version sync: keep this aligned with gradle/libs.versions.toml,
          # .github/actions/gradle-setup/action.yml, and AGENTS.md.
          java-version: '25'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        # No gradle-version pin: ./gradlew uses the wrapper's version, so a pin here only
        # downloads a second, unused distribution.

      - name: Run lintFormat
        run: ./gradlew lintFormat --no-daemon -Dktlint.ignoreFailures=true --continue

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply lintFormat auto-fixes

          🤖 Auto-generated by GitHub Actions"
          git push
