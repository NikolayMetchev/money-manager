# Unified CI: build/test, Android instrumented tests, Qodana, and auto-format.
# A single `changes` job decides once whether the push/PR touches anything
# other than docs/webpage/markdown; every heavy job below `needs` it and is
# skipped otherwise. A skipped *required* job is treated as a pass by branch
# protection, so the required checks still report green (skipping at the
# workflow level via `on.paths` would instead leave them pending forever and
# block the merge).
name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      # Default to 'true' (run everything) when the filter doesn't run, e.g. on
      # workflow_dispatch where there is no diff base. A non-empty 'false' from
      # the filter is truthy and wins over the fallback.
      code: ${{ steps.filter.outputs.code || 'true' }}
    steps:
      # Needed so paths-filter can diff against the previous commit on push
      # events (on pull_request it uses the API and the checkout is unused).
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Filter changed paths
        id: filter
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          # 'every' => a file matches `code` only if it is outside ALL of these
          # globs, so `code` is true when any real (non-docs) file changed.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!docs/**'
              - '!webpage/**'
              - '!**/*.md'
              - '!.github/workflows/static.yml'

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: changes
    # Runs on PRs and pushes to main (not on releases/* pushes).
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build with Gradle
        uses: ./.github/actions/gradle-run
        with:
          command: build --stacktrace
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Upload coverage and test results to Codecov
        uses: ./.github/actions/codecov-upload
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unit

  android-test:
    name: Android Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Gradle environment
        uses: ./.github/actions/gradle-setup
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          # Android emulator API level sync: update with the Gradle managed device,
          # .idea/runConfigurations/Android_Tests.xml, and AGENTS.md.
          key: avd-pixel6-api36-${{ runner.os }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # Android emulator API level sync: update with the Gradle managed device,
          # .idea/runConfigurations/Android_Tests.xml, and AGENTS.md.
          api-level: 36
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run Android instrumented tests
        timeout-minutes: 20
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # Android emulator API level sync: update with the Gradle managed device,
          # .idea/runConfigurations/Android_Tests.xml, and AGENTS.md.
          api-level: 36
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedAndroidDeviceTest createAndroidDeviceTestCoverageReport --stacktrace --console=plain

      - name: Upload coverage and test results to Codecov
        if: always()
        uses: ./.github/actions/codecov-upload
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: instrumented
          coverage-file: '**/build/reports/coverage/**/*.xml'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-results
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
          retention-days: 7

  qodana:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          # On PRs check out the actual PR commit, not the merge commit; on
          # push/workflow_dispatch fall back to the triggered ref.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: Generate SQLDelight and Mappie sources
        uses: ./.github/actions/gradle-run
        with:
          command: jvmMainClasses
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Restore Qodana cache (read-only on non-main branches)
        if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/releases/')
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/qodana/caches
          key: qodana-2026.1-refs/heads/main
          restore-keys: qodana-2026.1-
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
          use-caches: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/releases/') }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1874207222 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: qodana-sarif
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          retention-days: 7
      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

  lint-format:
    name: Auto-format PR
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          # Use PAT to trigger workflows on the pushed commit
          # GITHUB_TOKEN doesn't trigger workflows to prevent infinite loops
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          # JVM version sync: keep this aligned with gradle/libs.versions.toml,
          # .github/actions/gradle-setup/action.yml, and AGENTS.md.
          java-version: '25'
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Gradle version sync: keep this aligned with gradle/wrapper/gradle-wrapper.properties
          # and .github/actions/gradle-setup/action.yml.
          gradle-version: 9.5.0

      - name: Run lintFormat
        run: ./gradlew lintFormat --no-daemon -Dktlint.ignoreFailures=true --continue

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply lintFormat auto-fixes

          🤖 Auto-generated by GitHub Actions"
          git push
