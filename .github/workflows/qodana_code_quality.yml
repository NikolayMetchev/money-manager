name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

concurrency:
  group: qodana-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qodana:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: Generate coverage report
        uses: ./.github/actions/gradle-run
        with:
          command: koverXmlReport
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Copy coverage report for Qodana
        run: mkdir -p .qodana/code-coverage && cp build/reports/kover/report.xml .qodana/code-coverage/
      - name: Restore Qodana cache (read-only on PRs)
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/qodana/caches
          key: qodana-2026.1-refs/heads/main
          restore-keys: qodana-2026.1-
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
          use-caches: ${{ github.event_name != 'pull_request' }}
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1874207222 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-sarif
          path: ${{ runner.temp }}/qodana/results/qodana.sarif.json
          retention-days: 7
      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json